<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Admin Panel | NARUTO HOST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
    :root{--bg:#000;--card:rgba(28,28,30,.9);--accent:#ff3b30;--blue:#007aff;--green:#34c759;--orange:#ff9f0a;--purple:#af52de;--border:rgba(255,255,255,.1);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;padding-bottom:90px;}
    .navbar{background:rgba(0,0,0,.7);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);
      padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .container{max-width:800px;margin:auto;padding:16px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .stat{background:var(--card);border:.5px solid var(--border);padding:14px;border-radius:18px;}
    .slabel{font-size:10px;color:#8e8e93;font-weight:700;text-transform:uppercase;}
    .sval{font-size:20px;font-weight:800;margin-top:3px;display:block;}
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
    .don{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
    .doff{background:#555;}
    .dsus{background:var(--orange);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .ucard{background:var(--card);border:.5px solid var(--border);border-radius:20px;padding:16px;margin-bottom:14px;}
    .urow{display:flex;align-items:center;gap:12px;}
    .avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#1c1c1e,#3a3a3c);
      display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0;}
    .badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
    .badge{font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;}
    .bb{background:rgba(0,122,255,.12);color:var(--blue);}
    .bg{background:rgba(52,199,89,.12);color:var(--green);}
    .br{background:rgba(255,59,48,.12);color:var(--accent);}
    .bo{background:rgba(255,159,10,.12);color:var(--orange);}
    .bgr{background:rgba(255,255,255,.06);color:#8e8e93;}
    /* Server rows inside user card */
    .srv-section{margin-top:12px;border-top:.5px solid var(--border);padding-top:12px;}
    .srv-title{font-size:10px;color:#8e8e93;font-weight:700;text-transform:uppercase;margin-bottom:8px;}
    .srow{display:flex;align-items:center;justify-content:space-between;
      padding:9px 12px;background:rgba(255,255,255,.04);border-radius:12px;margin-bottom:6px;}
    .sname{font-size:13px;font-weight:700;}
    .sstatus{font-size:10px;font-weight:700;margin-top:2px;}
    .sbtns{display:flex;gap:6px;}
    .sbtn{background:rgba(255,255,255,.08);border:none;border-radius:8px;padding:5px 10px;
      color:#fff;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;}
    /* Action buttons */
    .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;
      margin-top:12px;border-top:.5px solid var(--border);padding-top:12px;}
    .abtn{background:rgba(255,255,255,.05);border:none;border-radius:11px;padding:10px 0;
      color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
    .abtn span{font-size:9px;font-weight:700;}
    .fab{position:fixed;bottom:20px;right:20px;background:var(--purple);border:none;border-radius:20px;
      padding:14px 20px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;
      display:flex;align-items:center;gap:8px;box-shadow:0 8px 25px rgba(175,82,222,.4);z-index:999;font-family:inherit;}
    .empty-srv{color:#555;font-size:12px;text-align:center;padding:10px;font-style:italic;}
  </style>
</head>
<body>
<nav class="navbar">
  <div style="font-weight:800;font-size:17px;">⚡ Admin Panel</div>
  <div style="display:flex;gap:8px;">
    <button onclick="manageAnnouncement()" style="background:rgba(255,159,10,.15);border:1px solid rgba(255,159,10,.3);border-radius:16px;padding:9px 14px;color:#ff9f0a;font-weight:800;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;">
      <i class="fa-solid fa-bullhorn"></i> Announce
    </button>
    <button onclick="createUser()" style="background:var(--blue);border:none;border-radius:16px;padding:9px 16px;color:#fff;font-weight:800;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;">
      <i class="fa-solid fa-user-plus"></i> New User
    </button>
  </div>
</nav>

<div class="container">
  <div class="grid2">
    <div class="stat">
      <div class="slabel">Active Servers</div>
      <span class="sval"><span class="dot don"></span><span id="onlineCount">0</span> Online</span>
    </div>
    <div class="stat">
      <div class="slabel">Total Servers</div>
      <span class="sval" id="totalSrv">0</span>
    </div>
    <div class="stat">
      <div class="slabel">Total Users</div>
      <span class="sval" id="totalUsers">0</span>
    </div>
    <div class="stat">
      <div class="slabel">CPU</div>
      <span class="sval" id="cpuVal">—</span>
    </div>
  </div>

  <div id="userList"><div style="text-align:center;padding:40px;color:#555;">Loading...</div></div>
</div>

<button class="fab" onclick="changeCredentials()">
  <i class="fa-solid fa-key"></i> Change Login
</button>

<script>
async function loadData() {
  try {
    const res = await fetch('/admin/stats');
    const d = await res.json();

    // Session expired or not logged in
    if (!d.users) {
      window.location.href = '/admin-login';
      return;
    }

    document.getElementById('cpuVal').innerText = d.sys_cpu || '0%';
    document.getElementById('totalUsers').innerText = d.users.length;

    let totalSrv = 0, onlineSrv = 0;
    d.users.forEach(u => {
      totalSrv += (u.srv_count || 0);
      onlineSrv += (u.active_srvs || 0);
    });
    document.getElementById('onlineCount').innerText = onlineSrv;
    document.getElementById('totalSrv').innerText = totalSrv;

    document.getElementById('userList').innerHTML = d.users.length === 0
      ? '<div style="text-align:center;padding:40px;color:#555;">No users yet. Add one above.</div>'
      : d.users.map(u => {
      const limit = u.server_limit ?? 1;

      // Expiry badge
      let expBadge = '';
      if (u.expiry_date) {
        if (u.is_expired) expBadge = `<span class="badge br">⛔ Expired</span>`;
        else if (u.days_left <= 3) expBadge = `<span class="badge bo">⚠️ ${u.days_left}d left</span>`;
        else expBadge = `<span class="badge bo">📅 ${u.days_left}d left</span>`;
      } else {
        expBadge = `<span class="badge bgr">∞ Lifetime</span>`;
      }

      // Server list
      const servers = u.servers || [];
      let srvHtml = `<div class="srv-section">
        <div class="srv-title"><i class="fa-solid fa-server" style="margin-right:5px;"></i>Servers (${servers.length}/${limit})</div>`;

      if (servers.length === 0) {
        srvHtml += `<div class="empty-srv">No servers — Add one below</div>`;
      } else {
        srvHtml += servers.map(s => {
          const color = s.online ? 'var(--green)' : (s.status === 'suspended' ? 'var(--orange)' : '#666');
          const dotClass = s.online ? 'don' : (s.status === 'suspended' ? 'dsus' : 'doff');
          const statusText = s.online ? 'ONLINE' : (s.status === 'suspended' ? 'SUSPENDED' : 'OFFLINE');
          return `
          <div class="srow">
            <div>
              <div class="sname">${s.name}</div>
              <div class="sstatus" style="color:${color}">
                <span class="dot ${dotClass}"></span>${statusText}
              </div>
            </div>
            <div class="sbtns">
              ${s.status === 'suspended'
                ? `<button class="sbtn" style="color:var(--green)" onclick="toggleSrv(${s.id},'active')">Unsuspend</button>`
                : `<button class="sbtn" style="color:var(--orange)" onclick="toggleSrv(${s.id},'suspended')">Suspend</button>`
              }
              <button class="sbtn" style="color:var(--accent)" onclick="deleteSrv(${s.id})">Delete</button>
            </div>
          </div>`;
        }).join('');
      }
      srvHtml += `</div>`;

      return `
      <div class="ucard">
        <div class="urow">
          <div class="avatar">${(u.fname || '?')[0].toUpperCase()}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:800;font-size:15px;">${u.fname}</div>
            <div style="font-size:11px;color:#8e8e93;overflow:hidden;text-overflow:ellipsis;">${u.email}</div>
            <div class="badges">
              <span class="badge bb">Limit: ${limit}</span>
              <span class="badge ${u.status === 'active' ? 'bg' : 'br'}">${u.status}</span>
              ${expBadge}
            </div>
          </div>
          <div style="text-align:right;font-size:11px;font-weight:700;flex-shrink:0;">
            <div style="color:var(--green)">${u.active_srvs} ON</div>
            <div style="color:#555">${u.srv_count} total</div>
          </div>
        </div>

        ${srvHtml}

        <div class="actions">
          <button class="abtn" onclick="addSrvForUser(${u.id}, ${limit}, ${servers.length})">
            <i class="fa-solid fa-plus" style="color:var(--blue)"></i><span>Add Server</span>
          </button>
          <button class="abtn" onclick="editUser(${u.id},'${u.role}',${limit},'${u.status}','${u.expiry_date || ''}')">
            <i class="fa-solid fa-sliders" style="color:var(--orange)"></i><span>Edit</span>
          </button>
          ${u.status === 'active'
            ? `<button class="abtn" onclick="toggleBan(${u.id},'banned','${u.role}',${limit})"><i class="fa-solid fa-user-slash" style="color:var(--accent)"></i><span>Ban</span></button>`
            : `<button class="abtn" onclick="toggleBan(${u.id},'active','${u.role}',${limit})"><i class="fa-solid fa-user-check" style="color:var(--green)"></i><span>Unban</span></button>`
          }
          <button class="abtn" onclick="deleteUser(${u.id})">
            <i class="fa-solid fa-trash" style="color:var(--accent)"></i><span>Delete</span>
          </button>
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    console.error('Error loading data:', e);
  }
}

async function addSrvForUser(uid, limit, current) {
  if (current >= limit) {
    Swal.fire({icon:'warning', title:'Limit Full!', text:`User already has ${current}/${limit} servers`, background:'#1c1c1e', color:'#fff'});
    return;
  }
  const {value: name} = await Swal.fire({
    title: 'Server Name', input: 'text', inputPlaceholder: 'e.g. MyBot',
    background: '#1c1c1e', color: '#fff', confirmButtonText: 'Create'
  });
  if (!name || !name.trim()) return;
  const res = await fetch('/admin/create-server', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user_id: uid, name: name.trim()})
  });
  const data = await res.json();
  if (data.status === 'success') {
    Swal.fire({icon:'success', title:'Server Created!', background:'#1c1c1e', color:'#fff', timer:1200, showConfirmButton:false});
    loadData();
  } else {
    Swal.fire({icon:'error', title:'Error', text: data.msg || 'Failed', background:'#1c1c1e', color:'#fff'});
  }
}

async function toggleSrv(sid, status) {
  await fetch(`/admin/suspend-server/${sid}`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({status})
  });
  loadData();
}

async function deleteSrv(sid) {
  const r = await Swal.fire({title:'Delete Server?', icon:'warning', background:'#1c1c1e', color:'#fff',
    showCancelButton:true, confirmButtonColor:'#ff3b30', confirmButtonText:'Delete'});
  if (r.isConfirmed) {
    await fetch(`/admin/delete-server/${sid}`, {method:'POST'});
    loadData();
  }
}

async function toggleBan(id, status, role, limit) {
  await fetch('/admin/user/update', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({user_id:id, status, role, limit})
  });
  loadData();
}

async function editUser(id, role, limit, status, expiry) {
  const {value: form} = await Swal.fire({
    title: 'Edit User', background:'#1c1c1e', color:'#fff',
    html: `
      <label style="font-size:11px;color:#8e8e93;display:block;text-align:left;margin-bottom:4px;">Server Limit</label>
      <input id="sw-limit" type="number" min="1" class="swal2-input" value="${limit}" style="background:#2c2c2e;color:#fff;border-radius:10px;">
      <label style="font-size:11px;color:#8e8e93;display:block;text-align:left;margin:10px 0 4px;">Extend Expiry (days, 0 = no change)</label>
      <input id="sw-days" type="number" min="0" class="swal2-input" value="0" style="background:#2c2c2e;color:#fff;border-radius:10px;">
      <div style="font-size:11px;color:#ff9f0a;margin-top:8px;">Current: ${expiry || 'Lifetime'}</div>
    `,
    preConfirm: () => ({
      user_id: id, limit: +document.getElementById('sw-limit').value,
      role, status, extra_days: +document.getElementById('sw-days').value
    })
  });
  if (!form) return;
  await fetch('/admin/user/update', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(form)});
  if (form.extra_days > 0) {
    await fetch('/admin/extend-expiry', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_id: id, days: form.extra_days})});
  }
  loadData();
}

async function createUser() {
  const {value: v} = await Swal.fire({
    title: 'Create New User', background:'#1c1c1e', color:'#fff',
    html: `
      <input id="n-name" class="swal2-input" placeholder="Full Name" style="background:#2c2c2e;color:#fff;border-radius:10px;">
      <input id="n-email" class="swal2-input" placeholder="Email / Username" style="background:#2c2c2e;color:#fff;border-radius:10px;">
      <input id="n-pass" class="swal2-input" type="password" placeholder="Password" style="background:#2c2c2e;color:#fff;border-radius:10px;">
      <input id="n-limit" type="number" class="swal2-input" placeholder="Server Limit" value="1" style="background:#2c2c2e;color:#fff;border-radius:10px;">
      <input id="n-days" type="number" class="swal2-input" placeholder="Validity days (0=lifetime)" value="30" style="background:#2c2c2e;color:#fff;border-radius:10px;">
    `,
    preConfirm: () => ({
      name: document.getElementById('n-name').value,
      email: document.getElementById('n-email').value,
      pass: document.getElementById('n-pass').value,
      limit: document.getElementById('n-limit').value,
      days: document.getElementById('n-days').value
    })
  });
  if (v) {
    const res = await fetch('/admin/create-user', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(v)});
    const data = await res.json();
    if (data.status === 'success') {
      Swal.fire({icon:'success', title:'User Created!', background:'#1c1c1e', color:'#fff', timer:1200, showConfirmButton:false});
      loadData();
    }
  }
}

async function deleteUser(id) {
  const r = await Swal.fire({title:'Delete User?', text:'All servers deleted!',
    icon:'warning', background:'#1c1c1e', color:'#fff',
    showCancelButton:true, confirmButtonColor:'#ff3b30'});
  if (r.isConfirmed) {
    await fetch(`/admin/delete-user/${id}`, {method:'POST'});
    loadData();
  }
}

async function manageAnnouncement() {
  // First fetch current announcement
  const res = await fetch('/api/announcement');
  const cur = await res.json();

  const { value: v } = await Swal.fire({
    title: '📢 Announcement',
    background: '#1c1c1e', color: '#fff',
    width: '90%',
    html: `
      <label style="font-size:11px;color:#8e8e93;display:block;text-align:left;margin-bottom:5px;">Title</label>
      <input id="ann-title" class="swal2-input" placeholder="Announcement title" value="${cur.popup_title || ''}" style="background:#2c2c2e;color:#fff;border-radius:10px;margin-bottom:10px;">
      
      <label style="font-size:11px;color:#8e8e93;display:block;text-align:left;margin-bottom:5px;">Message</label>
      <textarea id="ann-msg" class="swal2-textarea" placeholder="Write your message here..." style="background:#2c2c2e;color:#fff;border-radius:10px;min-height:100px;margin-bottom:10px;">${cur.popup_msg || ''}</textarea>
      
      <label style="font-size:11px;color:#8e8e93;display:block;text-align:left;margin-bottom:5px;">Image (optional)</label>
      <input id="ann-img" type="file" accept="image/*" class="swal2-file" style="background:#2c2c2e;color:#fff;border-radius:10px;margin-bottom:10px;">
      
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:12px;background:#2c2c2e;border-radius:12px;">
        <span style="font-size:13px;font-weight:700;">Show to all users?</span>
        <label style="position:relative;display:inline-block;width:44px;height:24px;">
          <input type="checkbox" id="ann-show" ${cur.show_popup ? 'checked' : ''} style="opacity:0;width:0;height:0;">
          <span onclick="this.previousElementSibling.checked=!this.previousElementSibling.checked;this.style.background=this.previousElementSibling.checked?'#34c759':'#3a3a3c';" 
                style="position:absolute;cursor:pointer;inset:0;border-radius:24px;background:${cur.show_popup ? '#34c759' : '#3a3a3c'};transition:.3s;">
            <span style="position:absolute;left:2px;bottom:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.3s;"></span>
          </span>
        </label>
      </div>
      ${cur.show_popup ? '<div style="margin-top:10px;padding:8px 12px;background:rgba(52,199,89,.1);border-radius:10px;color:#34c759;font-size:12px;font-weight:700;">✅ Currently ACTIVE — users see this on login</div>' : '<div style="margin-top:10px;padding:8px 12px;background:rgba(255,59,48,.08);border-radius:10px;color:#ff6b6b;font-size:12px;font-weight:700;">❌ Currently HIDDEN</div>'}
    `,
    showCancelButton: true,
    showDenyButton: true,
    confirmButtonText: '💾 Save',
    denyButtonText: '🗑️ Clear',
    cancelButtonText: 'Cancel',
    confirmButtonColor: '#007aff',
    denyButtonColor: '#ff3b30',
    preConfirm: () => ({
      title: document.getElementById('ann-title').value,
      msg: document.getElementById('ann-msg').value,
      show: document.getElementById('ann-show').checked,
      img: document.getElementById('ann-img').files[0]
    })
  });

  if (!v) return;

  if (Swal.getDenyButton() && Swal.getDenyButton().contains(document.activeElement)) {
    // Clear clicked - handled below
  }

  const fd = new FormData();
  fd.append('title', v.title || '');
  fd.append('msg', v.msg || '');
  fd.append('show', v.show ? 'true' : 'false');
  if (v.img) fd.append('image', v.img);

  const saveRes = await fetch('/admin/set-popup', { method: 'POST', body: fd });
  const data = await saveRes.json();
  
  if (data.status === 'success') {
    Swal.fire({
      icon: 'success',
      title: v.show ? '📢 Announcement is LIVE!' : '💾 Saved (hidden)',
      text: v.show ? 'All users will see this popup on next login.' : 'Announcement saved but not shown.',
      background: '#1c1c1e', color: '#fff',
      timer: 2500, showConfirmButton: false
    });
  }
}

async function clearAnnouncement() {
  const fd = new FormData();
  fd.append('title', ''); fd.append('msg', ''); fd.append('show', 'false');
  await fetch('/admin/set-popup', { method: 'POST', body: fd });
  Swal.fire({ icon: 'success', title: 'Cleared!', background: '#1c1c1e', color: '#fff', timer: 1200, showConfirmButton: false });
}

async function changeCredentials() {
  const {value: v} = await Swal.fire({
    title: 'Change Admin Login', background:'#1c1c1e', color:'#fff',
    html: `
      <input id="c-email" class="swal2-input" placeholder="New Email" style="background:#2c2c2e;color:#fff;border-radius:10px;">
      <input id="c-pass" class="swal2-input" type="password" placeholder="New Password" style="background:#2c2c2e;color:#fff;border-radius:10px;">
    `,
    preConfirm: () => ({email: document.getElementById('c-email').value, password: document.getElementById('c-pass').value})
  });
  if (v && v.email && v.password) {
    await fetch('/admin/change-credentials', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(v)});
    Swal.fire({icon:'success', title:'Done! Re-login karo.', background:'#1c1c1e', color:'#fff'})
      .then(() => location.href = '/admin-login');
  }
}

setInterval(loadData, 5000);
loadData();
</script>
</body>
</html>
