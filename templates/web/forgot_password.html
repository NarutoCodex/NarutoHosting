<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Forgot Password | NARUTO HOST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
    body{
      background:#050505;
      background-image:radial-gradient(circle at 30% 30%, rgba(175,82,222,0.12) 0%, transparent 50%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .box{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;padding:45px 30px;
      width:100%;max-width:380px;text-align:center;
      box-shadow:0 25px 50px rgba(0,0,0,0.6);
    }
    .icon{
      width:65px;height:65px;background:rgba(175,82,222,0.12);
      border-radius:18px;border:1px solid rgba(175,82,222,0.25);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px;font-size:28px;color:#af52de;
    }
    h2{color:#fff;font-size:22px;font-weight:800;margin-bottom:6px;}
    .sub{color:#666;font-size:13px;margin-bottom:25px;line-height:1.5;}
    .field{position:relative;margin-bottom:15px;text-align:left;}
    .field label{color:#888;font-size:11px;font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px;}
    .field i{position:absolute;right:16px;bottom:16px;color:#555;font-size:15px;}
    input{
      width:100%;padding:15px 45px 15px 16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:14px;color:#fff;font-size:15px;outline:none;
      font-family:'Plus Jakarta Sans',sans-serif;
    }
    input:focus{border-color:#af52de;background:rgba(175,82,222,0.08);}
    .btn{
      width:100%;padding:16px;margin-top:8px;
      background:linear-gradient(135deg,#af52de,#7b2fff);
      border:none;border-radius:14px;color:#fff;
      font-weight:800;font-size:15px;cursor:pointer;
      font-family:'Plus Jakarta Sans',sans-serif;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .back{margin-top:20px;color:#555;font-size:12px;}
    .back a{color:#af52de;text-decoration:none;}
    /* Step indicator */
    .steps{display:flex;justify-content:center;gap:8px;margin-bottom:25px;}
    .step{width:28px;height:4px;border-radius:4px;background:rgba(255,255,255,0.1);transition:0.3s;}
    .step.active{background:#af52de;}
    .step.done{background:#34c759;}
    /* OTP inputs */
    .otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:15px;}
    .otp-row input{
      width:45px;height:55px;text-align:center;font-size:22px;font-weight:800;
      padding:0;border-radius:14px;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="icon" id="mainIcon"><i class="fas fa-lock-open"></i></div>
  <h2 id="mainTitle">Forgot Password</h2>
  <p class="sub" id="mainSub">Enter your registered email — we'll send an OTP.</p>

  <div class="steps">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>

  <!-- Step 1: Email -->
  <div id="step1">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="off">
      <i class="fas fa-envelope"></i>
    </div>
    <button class="btn" id="sendBtn" onclick="sendOTP()">
      Send OTP <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <!-- Step 2: OTP -->
  <div id="step2" style="display:none;">
    <p style="color:#8e8e93;font-size:12px;margin-bottom:15px;">Enter the 6-digit OTP sent to your email</p>
    <div class="otp-row">
      <input type="number" class="otp-digit" maxlength="1" min="0" max="9" oninput="otpInput(this,0)">
      <input type="number" class="otp-digit" maxlength="1" min="0" max="9" oninput="otpInput(this,1)">
      <input type="number" class="otp-digit" maxlength="1" min="0" max="9" oninput="otpInput(this,2)">
      <input type="number" class="otp-digit" maxlength="1" min="0" max="9" oninput="otpInput(this,3)">
      <input type="number" class="otp-digit" maxlength="1" min="0" max="9" oninput="otpInput(this,4)">
      <input type="number" class="otp-digit" maxlength="1" min="0" max="9" oninput="otpInput(this,5)">
    </div>
    <button class="btn" onclick="verifyOTP()">
      Verify OTP <i class="fas fa-check"></i>
    </button>
    <div style="margin-top:12px;font-size:12px;color:#555;">
      Didn't get it? <span onclick="resendOTP()" style="color:#af52de;cursor:pointer;">Resend</span>
    </div>
  </div>

  <!-- Step 3: New Password -->
  <div id="step3" style="display:none;">
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Enter new password">
      <i class="fas fa-lock"></i>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confPass" placeholder="Confirm new password">
      <i class="fas fa-lock"></i>
    </div>
    <button class="btn" onclick="resetPassword()">
      Reset Password <i class="fas fa-shield-halved"></i>
    </button>
  </div>

  <div class="back">
    <a href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a>
  </div>
</div>

<script>
let userEmail = '';

function setStep(n) {
  ['step1','step2','step3'].forEach((s,i) => {
    document.getElementById(s).style.display = i+1 === n ? 'block' : 'none';
    document.getElementById('s'+(i+1)).className = 'step' + (i+1 < n ? ' done' : i+1 === n ? ' active' : '');
  });
  const icons = ['fa-lock-open','fa-shield-halved','fa-key'];
  const titles = ['Forgot Password','Enter OTP','New Password'];
  const subs = [
    'Enter your registered email — we\'ll send an OTP.',
    'Check your email for the 6-digit OTP.',
    'Create a strong new password.'
  ];
  document.getElementById('mainIcon').innerHTML = `<i class="fas ${icons[n-1]}"></i>`;
  document.getElementById('mainTitle').innerText = titles[n-1];
  document.getElementById('mainSub').innerText = subs[n-1];
}

function otpInput(el, idx) {
  // Only keep single digit
  el.value = el.value.toString().slice(-1);
  const digits = document.querySelectorAll('.otp-digit');
  if (el.value && idx < 5) digits[idx+1].focus();
}

async function sendOTP() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) return;
  userEmail = email;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending...';

  const res = await fetch('/forgot-password/send-otp', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email})
  });
  const d = await res.json();

  if (d.status === 'success') {
    setStep(2);
  } else {
    Swal.fire({icon:'error', title: d.msg || 'Email not found!', background:'#1c1c1e', color:'#fff', timer:2500, showConfirmButton:false});
    btn.disabled = false;
    btn.innerHTML = 'Send OTP <i class="fas fa-paper-plane"></i>';
  }
}

async function verifyOTP() {
  const digits = document.querySelectorAll('.otp-digit');
  const otp = Array.from(digits).map(d => d.value).join('');
  if (otp.length < 6) {
    Swal.fire({icon:'warning', title:'Enter all 6 digits!', background:'#1c1c1e', color:'#fff', timer:1500, showConfirmButton:false});
    return;
  }

  const res = await fetch('/forgot-password/verify-otp', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: userEmail, otp})
  });
  const d = await res.json();

  if (d.status === 'success') {
    setStep(3);
  } else {
    Swal.fire({icon:'error', title: d.msg || 'Wrong OTP!', background:'#1c1c1e', color:'#fff', timer:2000, showConfirmButton:false});
  }
}

async function resendOTP() {
  await fetch('/forgot-password/send-otp', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: userEmail})
  });
  Swal.fire({icon:'success', title:'OTP Resent!', background:'#1c1c1e', color:'#fff', timer:1500, showConfirmButton:false});
}

async function resetPassword() {
  const np = document.getElementById('newPass').value;
  const cp = document.getElementById('confPass').value;
  if (!np || np.length < 6) {
    Swal.fire({icon:'warning', title:'Min 6 characters!', background:'#1c1c1e', color:'#fff', timer:1500, showConfirmButton:false});
    return;
  }
  if (np !== cp) {
    Swal.fire({icon:'error', title:'Passwords do not match!', background:'#1c1c1e', color:'#fff', timer:1500, showConfirmButton:false});
    return;
  }
  const res = await fetch('/forgot-password/reset', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: userEmail, password: np})
  });
  const d = await res.json();
  if (d.status === 'success') {
    Swal.fire({icon:'success', title:'Password Reset!', text:'Login with your new password.', background:'#1c1c1e', color:'#fff'})
      .then(() => location.href = '/login');
  }
}
</script>
</body>
</html>
