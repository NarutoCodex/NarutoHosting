<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Admin Login | NARUTO HOST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
    body {
      background: #050505;
      background-image: radial-gradient(circle at 20% 20%, rgba(175,82,222,0.15) 0%, transparent 50%);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .box {
      background: rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px; padding:45px 30px;
      width:100%; max-width:380px; text-align:center;
    }
    .icon {
      width:65px; height:65px;
      background:rgba(175,82,222,0.12);
      border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 20px; font-size:28px; color:#af52de;
    }
    h2 { color:#fff; font-size:24px; font-weight:800; margin-bottom:6px; }
    .sub { color:#666; font-size:13px; margin-bottom:30px; }
    .field { position:relative; margin-bottom:15px; text-align:left; }
    .field label { color:#888; font-size:11px; font-weight:700; text-transform:uppercase; display:block; margin-bottom:6px; }
    .field i { position:absolute; right:16px; bottom:16px; color:#555; font-size:15px; }
    input[type=text], input[type=password] {
      width:100%; padding:15px 45px 15px 16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:14px; color:#fff; font-size:15px; outline:none;
      font-family:'Plus Jakarta Sans',sans-serif;
    }
    input:focus { border-color:#af52de; background:rgba(175,82,222,0.08); }
    .btn {
      width:100%; padding:16px; margin-top:8px;
      background:linear-gradient(135deg,#af52de,#7b2fff);
      border:none; border-radius:14px; color:#fff;
      font-weight:800; font-size:16px; cursor:pointer;
      font-family:'Plus Jakarta Sans',sans-serif;
    }
    .btn:active { opacity:0.85; }
    .err {
      background:rgba(255,59,48,0.12);
      border:1px solid rgba(255,59,48,0.3);
      border-radius:12px; padding:11px 14px;
      color:#ff6b6b; font-size:13px; font-weight:600;
      margin-bottom:18px; display:flex; align-items:center; gap:8px;
    }
    .url-hint {
      margin-top:20px; color:#444; font-size:11px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon"><i class="fas fa-shield-halved"></i></div>
    <h2>Admin Panel</h2>
    <p class="sub">NARUTO HOST — Restricted Access</p>

    {% if error %}
    <div class="err">
      <i class="fas fa-circle-exclamation"></i> Wrong email or password!
    </div>
    {% endif %}

    <form method="POST" action="/admin-login">
      <div class="field">
        <label>Admin Email</label>
        <input type="text" name="username" placeholder="narutohost@gamil.com" required autocomplete="off">
        <i class="fas fa-envelope"></i>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••••••" required>
        <i class="fas fa-lock"></i>
      </div>
      <button type="submit" class="btn">Login as Admin</button>
    </form>

    <p class="url-hint">URL: /admin-login &nbsp;|&nbsp; /admin</p>
  </div>
</body>
</html>
