<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>NE-CORE | Admin Authority</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
    
    :root {
      --bg: #000000;
      --card: rgba(28, 28, 30, 0.7);
      --accent: #ff3b30; 
      --blue: #007aff;   
      --green: #34c759;  
      --orange: #ff9f0a;
      --purple: #af52de;
      --border: rgba(255, 255, 255, 0.1);
      --glass: blur(25px) saturate(180%);
    }

    body {
      background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0; padding-bottom: 80px;
    }

    .navbar {
      background: rgba(0, 0, 0, 0.5); backdrop-filter: var(--glass);
      border-bottom: 0.5px solid var(--border); padding: 15px 20px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 1000;
    }

    .container { max-width: 800px; margin: auto; padding: 20px; }

    .monitor-grid { 
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; 
    }
    .stat-pill {
      background: var(--card); border: 0.5px solid var(--border);
      padding: 15px; border-radius: 20px;
    }
    .stat-label { font-size: 10px; color: #8e8e93; font-weight: 700; text-transform: uppercase; }
    .stat-value { font-size: 18px; font-weight: 800; display: block; margin-top: 4px; }
    
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot-online { background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
    .dot-offline { background: var(--accent); }
    .dot-suspended { background: var(--orange); }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .user-card {
      background: var(--card); border-radius: 22px; padding: 18px;
      margin-bottom: 15px; border: 0.5px solid var(--border);
    }
    .u-top { display: flex; align-items: center; gap: 15px; }
    .u-avatar {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
      display: flex; align-items: center; justify-content: center; font-weight: 800;
      font-size: 18px;
    }

    .badge-row { margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
    .ios-badge {
      font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase;
    }
    .badge-limit { background: rgba(0, 122, 255, 0.1); color: var(--blue); }
    .badge-active { background: rgba(52, 199, 89, 0.1); color: var(--green); }
    .badge-banned { background: rgba(255, 59, 48, 0.1); color: var(--accent); }
    .badge-expiry { background: rgba(255, 159, 10, 0.1); color: var(--orange); }
    .badge-expired { background: rgba(255, 59, 48, 0.15); color: var(--accent); border: 1px solid rgba(255,59,48,0.3); }
    .badge-noexpiry { background: rgba(52, 199, 89, 0.08); color: #8e8e93; }

    .actions {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      margin-top: 15px; border-top: 0.5px solid var(--border); padding-top: 15px;
    }
    .ios-btn {
      background: rgba(255,255,255,0.05); border: none; border-radius: 12px;
      padding: 10px 0; color: #fff; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .ios-btn span { font-size: 9px; font-weight: 700; }

    /* Credential change button at bottom */
    .bottom-fab {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--purple); border: none; border-radius: 20px;
      padding: 14px 20px; color: #fff; font-weight: 800; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 25px rgba(175, 82, 222, 0.4);
      z-index: 999;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div style="font-weight:800; font-size:18px;">⚡ NE Authority</div>
  <button class="ios-btn" style="flex-direction:row; padding:8px 15px; background:var(--blue); border-radius:20px;" onclick="createUser()">
    <i class="fa-solid fa-plus"></i> <span style="margin-left:5px; font-size:12px;">New User</span>
  </button>
</nav>

<div class="container">
  <div class="monitor-grid">
    <div class="stat-pill">
      <span class="stat-label">Active Nodes</span>
      <span class="stat-value"><span class="dot dot-online"></span> <span id="onlineCount">0</span> Online</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">Total Servers</span>
      <span class="stat-value" id="totalSrvCount">0</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">Banned Users</span>
      <span class="stat-value"><span class="dot dot-suspended"></span> <span id="suspendedCount">0</span></span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">CPU Usage</span>
      <span class="stat-value" id="cpuVal">0%</span>
    </div>
  </div>

  <div id="userList"></div>
</div>

<!-- Credential Change FAB -->
<button class="bottom-fab" onclick="changeCredentials()">
  <i class="fa-solid fa-key"></i> Change Login
</button>

<script>
async function loadData() {
    try {
        const r = await fetch('/admin/stats');
        const d = await r.json();
        
        document.getElementById('cpuVal').innerText = d.sys_cpu || "0%";
        
        let totalSrv = 0, onlineSrv = 0, bannedUsers = 0;

        const list = document.getElementById('userList');
        list.innerHTML = d.users.map(u => {
            totalSrv += u.srv_count;
            onlineSrv += u.active_srvs;
            if(u.status === 'banned') bannedUsers++;

            const limit = u.server_limit !== undefined ? u.server_limit : 1;

            // Expiry badge
            let expiryBadge = '';
            if (u.expiry_date) {
                if (u.is_expired) {
                    expiryBadge = `<span class="ios-badge badge-expired">⛔ EXPIRED</span>`;
                } else if (u.days_left <= 3) {
                    expiryBadge = `<span class="ios-badge badge-expired">⚠️ ${u.days_left}d left</span>`;
                } else {
                    expiryBadge = `<span class="ios-badge badge-expiry">📅 ${u.days_left}d left</span>`;
                }
            } else {
                expiryBadge = `<span class="ios-badge badge-noexpiry">∞ No Expiry</span>`;
            }

            return `
            <div class="user-card animate__animated animate__fadeIn">
                <div class="u-top">
                    <div class="u-avatar">${(u.fname || '?')[0].toUpperCase()}</div>
                    <div style="flex:1">
                        <h4 style="margin:0; font-size:15px;">${u.fname}</h4>
                        <div style="font-size:11px; color:#8e8e93; margin-top:2px;">${u.email}</div>
                        <div class="badge-row">
                            <span class="ios-badge badge-limit">Limit: ${limit}</span>
                            <span class="ios-badge ${u.status === 'active' ? 'badge-active' : 'badge-banned'}">${u.status}</span>
                            ${expiryBadge}
                        </div>
                    </div>
                    <div style="text-align:right; font-size:11px; font-weight:700;">
                        <div style="color:var(--green)">${u.active_srvs} ON</div>
                        <div style="color:#8e8e93">${u.srv_count} TOTAL</div>
                    </div>
                </div>

                <div class="actions">
                    <button class="ios-btn" onclick="editPermissions(${u.id}, '${u.role}', ${limit}, '${u.status}', '${u.expiry_date || ''}')">
                        <i class="fa-solid fa-sliders"></i><span>Edit</span>
                    </button>
                    
                    ${u.status === 'active' ? 
                        `<button class="ios-btn" style="color:var(--accent)" onclick="toggleBan(${u.id}, 'banned', '${u.role}', ${limit})">
                            <i class="fa-solid fa-user-slash"></i><span>Ban</span>
                        </button>` : 
                        `<button class="ios-btn" style="color:var(--green)" onclick="toggleBan(${u.id}, 'active', '${u.role}', ${limit})">
                            <i class="fa-solid fa-user-check"></i><span>Unban</span>
                        </button>`
                    }

                    <button class="ios-btn" onclick="location.href='/admin/manage-user/${u.id}'">
                        <i class="fa-solid fa-server"></i><span>Servers</span>
                    </button>
                    <button class="ios-btn" style="color:var(--accent)" onclick="deleteUser(${u.id})">
                        <i class="fa-solid fa-trash"></i><span>Delete</span>
                    </button>
                </div>
            </div>`;
        }).join('');

        document.getElementById('onlineCount').innerText = onlineSrv;
        document.getElementById('totalSrvCount').innerText = totalSrv;
        document.getElementById('suspendedCount').innerText = bannedUsers;

    } catch(e) { console.error("Sync Error", e); }
}

async function toggleBan(id, newStatus, role, limit) {
    await fetch('/admin/user/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user_id: id, status: newStatus, role: role, limit: limit }) 
    });
    loadData();
}

async function editPermissions(id, role, limit, status, expiry) {
    const { value: form } = await Swal.fire({
        title: 'Edit User',
        background: '#1c1c1e', color: '#fff',
        html: `
            <label style="font-size:12px; color:#8e8e93; display:block; text-align:left; margin-bottom:5px;">Server Limit</label>
            <input id="sw-limit" type="number" class="swal2-input" value="${limit}" style="background:#2c2c2e; color:white; border-radius:10px; margin-bottom:10px;">
            <label style="font-size:12px; color:#8e8e93; display:block; text-align:left; margin-bottom:5px;">Role</label>
            <select id="sw-role" class="swal2-select" style="background:#2c2c2e; color:white; border-radius:10px; width:90%; padding:10px; margin-bottom:10px; border:1px solid #444;">
                <option value="free" ${role==='free'?'selected':''}>Free</option>
                <option value="premium" ${role==='premium'?'selected':''}>Premium</option>
            </select>
            <label style="font-size:12px; color:#8e8e93; display:block; text-align:left; margin-bottom:5px;">Add More Days (0 = no change)</label>
            <input id="sw-days" type="number" min="0" class="swal2-input" value="0" style="background:#2c2c2e; color:white; border-radius:10px;" placeholder="Extra days to add">
            <div style="font-size:11px; color:#ff9f0a; margin-top:8px;">Current expiry: ${expiry || 'None'}</div>
        `,
        preConfirm: () => ({
            user_id: id,
            limit: document.getElementById('sw-limit').value,
            role: document.getElementById('sw-role').value,
            status: status,
            extra_days: parseInt(document.getElementById('sw-days').value) || 0
        })
    });
    if(form) {
        // Update basic permissions
        await fetch('/admin/user/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(form)
        });
        // If extra days added, extend expiry
        if (form.extra_days > 0) {
            await fetch('/admin/extend-expiry', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: id, days: form.extra_days })
            });
        }
        loadData();
    }
}

async function createUser() {
    const { value: v } = await Swal.fire({
        title: 'Create New User',
        background: '#1c1c1e', color: '#fff',
        html: `
            <input id="n-name" class="swal2-input" placeholder="Full Name" style="background:#2c2c2e; color:white; border-radius:10px;">
            <input id="n-email" class="swal2-input" placeholder="Email / Username" style="background:#2c2c2e; color:white; border-radius:10px;">
            <input id="n-pass" class="swal2-input" type="password" placeholder="Password" style="background:#2c2c2e; color:white; border-radius:10px;">
            <input id="n-limit" type="number" class="swal2-input" placeholder="Server Limit" value="1" style="background:#2c2c2e; color:white; border-radius:10px;">
            <input id="n-days" type="number" class="swal2-input" placeholder="Validity (days, 0 = forever)" value="30" style="background:#2c2c2e; color:white; border-radius:10px;">
            <div style="font-size:11px; color:#8e8e93; margin-top:8px;">0 days = no expiry (lifetime)</div>
        `,
        preConfirm: () => ({
            name: document.getElementById('n-name').value,
            email: document.getElementById('n-email').value,
            pass: document.getElementById('n-pass').value,
            limit: document.getElementById('n-limit').value,
            days: document.getElementById('n-days').value
        })
    });
    if(v) {
        const res = await fetch('/admin/create-user', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(v) 
        });
        const data = await res.json();
        if (data.status === 'success') {
            Swal.fire({ icon: 'success', title: 'User Created!', background: '#1c1c1e', color: '#fff', timer: 1500, showConfirmButton: false });
        }
        loadData();
    }
}

async function deleteUser(id) {
    const res = await Swal.fire({ 
        title: 'Delete User?', 
        text: 'All their servers will be deleted!',
        icon: 'warning', background: '#1c1c1e', color: '#fff', showCancelButton: true,
        confirmButtonColor: '#ff3b30'
    });
    if(res.isConfirmed) {
        await fetch(`/admin/delete-user/${id}`, { method: 'POST' });
        loadData();
    }
}

async function changeCredentials() {
    const { value: v } = await Swal.fire({
        title: 'Change Admin Login',
        background: '#1c1c1e', color: '#fff',
        html: `
            <input id="c-email" class="swal2-input" placeholder="New Email / Username" style="background:#2c2c2e; color:white; border-radius:10px;">
            <input id="c-pass" class="swal2-input" type="password" placeholder="New Password" style="background:#2c2c2e; color:white; border-radius:10px;">
        `,
        preConfirm: () => ({
            email: document.getElementById('c-email').value,
            password: document.getElementById('c-pass').value
        })
    });
    if(v && v.email && v.password) {
        const res = await fetch('/admin/change-credentials', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(v)
        });
        const data = await res.json();
        if (data.status === 'success') {
            Swal.fire({ icon: 'success', title: 'Credentials Updated!', text: 'Please re-login.', background: '#1c1c1e', color: '#fff' })
            .then(() => { location.href = '/admin-login'; });
        }
    }
}

setInterval(loadData, 5000);
loadData();
</script>
</body>
</html>
